name: CI/CD

on:
  push:
    branches:
      - develop
      - main
      - 'feature/**'
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends subversion jq zip rsync

      # ──────────────────────────────────────────────
      # Compute version and release type from TOC + ref
      # ──────────────────────────────────────────────
      - name: Compute version and type
        id: info
        run: |
          TOC_VERSION=$(grep -oP '## Version: \K.*' SimpleDisenchant.toc)
          echo "TOC version: $TOC_VERSION"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            if [[ "$TAG_VERSION" != "$TOC_VERSION" ]]; then
              echo "::error::Tag version ($TAG_VERSION) does not match TOC version ($TOC_VERSION)"
              exit 1
            fi
            VERSION="$TOC_VERSION"
            TYPE="release"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION="${TOC_VERSION}-beta-${SHORT_SHA}"
            TYPE="beta"
          elif [[ "${GITHUB_REF}" == "refs/heads/develop" ]]; then
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION="${TOC_VERSION}-alpha-${SHORT_SHA}"
            TYPE="alpha"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION="${TOC_VERSION}-alpha-${SHORT_SHA}"
            TYPE="dry-run"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "type=$TYPE" >> "$GITHUB_OUTPUT"
          echo ""
          echo "→ Version: $VERSION"
          echo "→ Type   : $TYPE"

      - name: Set TOC version
        if: steps.info.outputs.type != 'release'
        run: |
          sed -i "s/^## Version: .*/## Version: ${{ steps.info.outputs.version }}/" SimpleDisenchant.toc

      # ──────────────────────────────────────────────
      # CHANGELOG validation and extraction
      # ──────────────────────────────────────────────
      - name: Check CHANGELOG for release
        if: steps.info.outputs.type == 'release'
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md missing entry for $VERSION"
            exit 1
          fi

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          BASE_VERSION="${VERSION%%-*}"
          BODY=""
          if grep -q "## \[$BASE_VERSION\]" CHANGELOG.md; then
            BODY=$(sed -n "/^## \[$BASE_VERSION\]/,/^## \[/p" CHANGELOG.md | sed '$d')
          fi
          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      # ──────────────────────────────────────────────
      # Build package (zip with externals)
      # ──────────────────────────────────────────────
      - name: Build package
        id: build
        run: ./scripts/build-package.sh
        env:
          VERSION: ${{ steps.info.outputs.version }}

      # ──────────────────────────────────────────────
      # Upload to CurseForge & Wago (skip dry-run)
      # ──────────────────────────────────────────────
      - name: Upload to CurseForge & Wago
        if: steps.info.outputs.type != 'dry-run'
        run: ./scripts/upload-package.sh
        env:
          ARCHIVE: ${{ steps.build.outputs.archive }}
          VERSION: ${{ steps.info.outputs.version }}
          RELEASE_TYPE: ${{ steps.info.outputs.type }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          CHANGELOG_BODY: ${{ steps.changelog.outputs.body }}

      # ──────────────────────────────────────────────
      # Summary
      # ──────────────────────────────────────────────
      - name: Generate summary
        run: |
          {
            echo "## ${{ steps.info.outputs.version }} (${{ steps.info.outputs.type }})"
            echo ""
            echo "**Archive:** \`${{ steps.build.outputs.archive_name }}\`"
            echo ""
            echo "${{ steps.changelog.outputs.body }}"
          } >> "$GITHUB_STEP_SUMMARY"

      # ──────────────────────────────────────────────
      # Release-only steps
      # ──────────────────────────────────────────────
      - name: Create GitHub Release
        if: steps.info.outputs.type == 'release'
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes "${{ steps.changelog.outputs.body }}" \
            "${{ steps.build.outputs.archive }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update develop after release
        if: steps.info.outputs.type == 'release'
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          NEXT="${MAJOR}.$((MINOR + 1)).0"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin develop
          git checkout develop
          git pull origin develop

          sed -i "s/^## Version: .*/## Version: $NEXT/" SimpleDisenchant.toc
          sed -i "/^## \[$VERSION\]/i ## [Unreleased]\n\n### Added\n\n### Fixed\n" CHANGELOG.md

          git add SimpleDisenchant.toc CHANGELOG.md
          git commit -m "chore: bump version to $NEXT after $VERSION release"
          git push origin develop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
