name: CI/CD

on:
  push:
    branches:
      - develop
      - main
      - 'feature/**'
      - 'features/**'
    tags:
      - 'v*'

# Skip runs triggered by release-please bump commits (they push to main
# but we don't want to publish a beta for a pure version-bump commit).
# The actual release is triggered by the tag created by release-please.

jobs:
  build:
    name: Build & Publish
    runs-on: ubuntu-latest
    # Skip bump commits from release-please on main (a tag will trigger the release)
    if: github.ref != 'refs/heads/main' || !startsWith(github.event.head_commit.message, 'chore: release')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends subversion jq zip rsync

      # ──────────────────────────────────────────────
      # Compute version and release type from TOC + ref
      # ──────────────────────────────────────────────
      - name: Compute version and type
        id: info
        run: |
          TOC_VERSION=$(grep -oP '## Version:\s*\K[^\s#]+' SimpleDisenchant.toc)
          echo "TOC version: $TOC_VERSION"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            if [[ "$TAG_VERSION" != "$TOC_VERSION" ]]; then
              echo "::error::Tag version ($TAG_VERSION) does not match TOC version ($TOC_VERSION)"
              exit 1
            fi
            VERSION="$TOC_VERSION"
            TYPE="release"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION="${TOC_VERSION}-beta-${SHORT_SHA}"
            TYPE="beta"
          elif [[ "${GITHUB_REF}" == "refs/heads/develop" ]]; then
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION="${TOC_VERSION}-alpha-${SHORT_SHA}"
            TYPE="alpha"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION="${TOC_VERSION}-alpha-${SHORT_SHA}"
            TYPE="dry-run"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "type=$TYPE" >> "$GITHUB_OUTPUT"
          echo ""
          echo "→ Version: $VERSION"
          echo "→ Type   : $TYPE"

      - name: Set TOC version
        run: |
          sed -i "s/^## Version: .*/## Version: ${{ steps.info.outputs.version }}/" SimpleDisenchant.toc

      # ──────────────────────────────────────────────
      # CHANGELOG validation and extraction
      # ──────────────────────────────────────────────
      - name: Check CHANGELOG for release
        if: steps.info.outputs.type == 'release'
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md missing entry for $VERSION"
            exit 1
          fi

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          BASE_VERSION="${VERSION%%-*}"
          BODY=""
          if grep -q "## \[$BASE_VERSION\]" CHANGELOG.md; then
            BODY=$(sed -n "/^## \[$BASE_VERSION\]/,/^## \[/p" CHANGELOG.md | sed '$d')
          fi
          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      # ──────────────────────────────────────────────
      # Build package (zip with externals)
      # ──────────────────────────────────────────────
      - name: Build package
        id: build
        run: ./scripts/build-package.sh
        env:
          VERSION: ${{ steps.info.outputs.version }}

      # ──────────────────────────────────────────────
      # Upload to CurseForge & Wago (skip dry-run)
      # ──────────────────────────────────────────────
      - name: Upload to CurseForge & Wago
        if: steps.info.outputs.type != 'dry-run'
        run: ./scripts/upload-package.sh
        env:
          ARCHIVE: ${{ steps.build.outputs.archive }}
          VERSION: ${{ steps.info.outputs.version }}
          RELEASE_TYPE: ${{ steps.info.outputs.type }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          CHANGELOG_BODY: ${{ steps.changelog.outputs.body }}

      # ──────────────────────────────────────────────
      # Summary
      # ──────────────────────────────────────────────
      - name: Generate summary
        run: |
          {
            echo "## ${{ steps.info.outputs.version }} (${{ steps.info.outputs.type }})"
            echo ""
            echo "**Archive:** \`${{ steps.build.outputs.archive_name }}\`"
            echo ""
            echo "${{ steps.changelog.outputs.body }}"
          } >> "$GITHUB_STEP_SUMMARY"

      # ──────────────────────────────────────────────
      # Release-only steps
      # ──────────────────────────────────────────────
      # release-please already creates the GitHub Release when its PR is
      # merged; we just attach the zip asset to that existing release.
      - name: Attach zip to GitHub Release
        if: steps.info.outputs.type == 'release'
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          gh release upload "v$VERSION" "${{ steps.build.outputs.archive }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Sync develop with main so it picks up the release-please bump
      # commit (TOC version + CHANGELOG update).
      - name: Sync develop with main after release
        if: steps.info.outputs.type == 'release'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main develop
          git checkout develop
          git pull origin develop
          git merge origin/main --no-edit
          git push origin develop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
