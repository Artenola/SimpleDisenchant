name: CI/CD

on:
  push:
    branches:
      - develop
      - main
      - 'feature/**'
    tags:
      - 'v*'

jobs:
  package:
    name: Package & Publish
    runs-on: ubuntu-latest
    # Skip redundant run when tag and branch push fire together
    if: >
      !(github.event_name == 'push' && startsWith(github.ref, 'refs/heads/') &&
        contains(github.event.head_commit.message, 'chore: bump version'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version
        id: version
        run: |
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)
          echo "Latest tag: ${LATEST_TAG:-none}"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # ── Release: version from tag ──
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "type=release" >> $GITHUB_OUTPUT

          elif [[ -n "$LATEST_TAG" ]]; then
            # ── Alpha/Beta: last tag patch+1 ──
            BASE="${LATEST_TAG#v}"
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            PATCH=$(echo "$BASE" | cut -d. -f3)
            SHORT_SHA=$(git rev-parse --short HEAD)
            NEXT_PATCH="${MAJOR}.${MINOR}.$((PATCH + 1))"

            if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
              VERSION="${NEXT_PATCH}-beta+${SHORT_SHA}"
              echo "type=beta" >> $GITHUB_OUTPUT
            elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
              VERSION="${NEXT_PATCH}-alpha+${SHORT_SHA}"
              echo "type=alpha" >> $GITHUB_OUTPUT
            else
              VERSION="${NEXT_PATCH}-alpha+${SHORT_SHA}"
              echo "type=dry-run" >> $GITHUB_OUTPUT
            fi

          else
            VERSION="0.1.0"
            echo "type=alpha" >> $GITHUB_OUTPUT
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Computed version: $VERSION"

      - name: Set TOC version
        run: |
          sed -i "s/^## Version: .*/## Version: ${{ steps.version.outputs.version }}/" SimpleDisenchant.toc
          grep "## Version" SimpleDisenchant.toc

      - name: Create beta tag for packager
        if: steps.version.outputs.type == 'beta'
        run: |
          git tag "v${{ steps.version.outputs.version }}"

      - name: Check CHANGELOG (release only)
        if: steps.version.outputs.type == 'release'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md does not contain an entry for version $VERSION"
            exit 1
          fi

      - name: Generate changelog summary
        run: |
          echo "## ${{ steps.version.outputs.version }} (${{ steps.version.outputs.type }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          VERSION="${{ steps.version.outputs.version }}"
          VERSION="${VERSION%%-*}"
          if grep -q "## \[$VERSION\]" CHANGELOG.md; then
            sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | head -n -1 >> $GITHUB_STEP_SUMMARY 2>/dev/null
          else
            echo "**Recent commits:**" >> $GITHUB_STEP_SUMMARY
            git log --oneline -15 --no-merges --pretty=format:"- %s" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Set package args
        id: pkg
        run: |
          TYPE="${{ steps.version.outputs.type }}"
          VERSION="${{ steps.version.outputs.version }}"

          LABEL="v${VERSION}"
          if [[ "$TYPE" == "dry-run" ]]; then
            echo "args=-d -n SimpleDisenchant-${VERSION}:${LABEL}" >> $GITHUB_OUTPUT
          else
            echo "args=-n SimpleDisenchant-${VERSION}:${LABEL}" >> $GITHUB_OUTPUT
          fi

      - name: Package & Publish
        uses: BigWigsMods/packager@v2
        with:
          args: ${{ steps.pkg.outputs.args }}
        env:
          CF_API_KEY: ${{ steps.version.outputs.type != 'dry-run' && secrets.CF_API_KEY || '' }}
          WAGO_API_TOKEN: ${{ steps.version.outputs.type != 'dry-run' && secrets.WAGO_API_TOKEN || '' }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.version.outputs.type == 'release'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract changelog section for this version
          BODY=$(sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | head -n -1)
          gh release create "v$VERSION" --title "v$VERSION" --notes "$BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update develop after release
        if: steps.version.outputs.type == 'release'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          NEXT_VERSION="${MAJOR}.$((MINOR + 1)).0"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout develop
          git pull origin develop

          # Bump TOC version
          sed -i "s/^## Version: .*/## Version: $NEXT_VERSION/" SimpleDisenchant.toc

          # Add [Unreleased] section to CHANGELOG
          sed -i "/^## \[$VERSION\]/i ## [Unreleased]\n\n### Added\n\n### Fixed\n" CHANGELOG.md

          git add SimpleDisenchant.toc CHANGELOG.md
          git commit -m "chore: bump version to $NEXT_VERSION after $VERSION release"
          git push origin develop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
