name: CI/CD

on:
  push:
    branches:
      - develop
      - 'feature/**'
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  package:
    name: Package & Publish
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'release' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      github.ref == 'refs/heads/develop' ||
      startsWith(github.ref, 'refs/heads/feature/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CHANGELOG (release only)
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md ne contient pas d'entrée pour la version $VERSION"
            exit 1
          fi
          echo "CHANGELOG OK pour $VERSION"

      - name: Compute next version for alpha/beta
        if: github.event_name != 'release'
        id: version
        run: |
          # Get latest tag (sorted by version)
          LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)
          echo "Latest tag: $LATEST_TAG"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Beta: use the tag version as-is
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "$LATEST_TAG" ]]; then
            # Alpha: increment minor version from latest tag
            BASE="${LATEST_TAG#v}"
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            PATCH=$(echo "$BASE" | cut -d. -f3)
            NEXT_MINOR=$((MINOR + 1))
            VERSION="${MAJOR}.${NEXT_MINOR}.0"
          else
            VERSION="0.1.0"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Computed version: $VERSION"

      - name: Update TOC version for alpha/beta
        if: github.event_name != 'release'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^## Version: .*/## Version: $VERSION/" SimpleDisenchant.toc
          echo "TOC version set to $VERSION"
          grep "## Version" SimpleDisenchant.toc

      - name: Generate changelog summary
        if: github.event_name != 'release'
        run: |
          echo "## Changes in this build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Beta (tag): extract CHANGELOG section for this version
            VERSION="${GITHUB_REF#refs/tags/v}"
            sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | head -n -1 >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No CHANGELOG entry for $VERSION" >> $GITHUB_STEP_SUMMARY
          else
            # Alpha (develop/feature): list recent commits
            echo "**Version: ${{ steps.version.outputs.version }}-alpha**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Recent commits:**" >> $GITHUB_STEP_SUMMARY
            git log --oneline -15 --no-merges --pretty=format:"- %s" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Set package args
        id: pkg
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "args=" >> $GITHUB_OUTPUT
            echo "publish=true" >> $GITHUB_OUTPUT

          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "args=-n {package-name}-{project-version}{beta}{nolib}{classic}:{project-version}{beta}{classic}{nolib}" >> $GITHUB_OUTPUT
            echo "publish=true" >> $GITHUB_OUTPUT

          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "args=-n {package-name}-{project-version}{alpha}{nolib}{classic}:{project-version}{alpha}{classic}{nolib}" >> $GITHUB_OUTPUT
            echo "publish=true" >> $GITHUB_OUTPUT

          else
            # feature/** : -d = skip upload (dry-run packager)
            echo "args=-d -n {package-name}-{project-version}{alpha}{nolib}{classic}:{project-version}{alpha}{classic}{nolib}" >> $GITHUB_OUTPUT
            echo "publish=false" >> $GITHUB_OUTPUT
          fi

      - name: Package & Publish
        uses: BigWigsMods/packager@v2
        with:
          args: ${{ steps.pkg.outputs.args }}
        env:
          CF_API_KEY: ${{ steps.pkg.outputs.publish == 'true' && secrets.CF_API_KEY || '' }}
          WAGO_API_TOKEN: ${{ steps.pkg.outputs.publish == 'true' && secrets.WAGO_API_TOKEN || '' }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
