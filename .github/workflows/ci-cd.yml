name: CI/CD

on:
  push:
    branches:
      - develop
      - main
      - 'feature/**'
    tags:
      - 'v*'

jobs:
  package:
    name: Package & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version and type
        id: info
        run: |
          # Read version from TOC
          TOC_VERSION=$(grep -oP '## Version: \K.*' SimpleDisenchant.toc)
          echo "TOC version: $TOC_VERSION"

          if [[ "${{ github.ref }}" == refs/tags/v*-beta* ]]; then
            # ── Beta tag (triggered externally) ──
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "type=beta" >> $GITHUB_OUTPUT

          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # ── Release tag ──
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "type=release" >> $GITHUB_OUTPUT

          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            # ── Main branch: create beta tag and package as beta ──
            BETA_COUNT=$(git tag --list "v${TOC_VERSION}-beta*" | wc -l)
            BETA_NUM=$((BETA_COUNT + 1))
            TAG="v${TOC_VERSION}-beta${BETA_NUM}"
            echo "Creating tag: $TAG"
            git tag "$TAG"
            git push origin "$TAG"
            VERSION="${TOC_VERSION}-beta${BETA_NUM}"
            echo "type=beta" >> $GITHUB_OUTPUT

          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            # ── Alpha ──
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION="${TOC_VERSION}-alpha+${SHORT_SHA}"
            echo "type=alpha" >> $GITHUB_OUTPUT

          else
            # ── Feature: dry-run ──
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION="${TOC_VERSION}-alpha+${SHORT_SHA}"
            echo "type=dry-run" >> $GITHUB_OUTPUT
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Set TOC version
        if: steps.info.outputs.type != 'release'
        run: |
          sed -i "s/^## Version: .*/## Version: ${{ steps.info.outputs.version }}/" SimpleDisenchant.toc

      - name: Check CHANGELOG
        if: steps.info.outputs.type == 'release'
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md does not contain an entry for version $VERSION"
            exit 1
          fi

      - name: Generate summary
        run: |
          echo "## ${{ steps.info.outputs.version }} (${{ steps.info.outputs.type }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          VERSION="${{ steps.info.outputs.version }}"
          VERSION="${VERSION%%-*}"
          if grep -q "## \[$VERSION\]" CHANGELOG.md; then
            sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | head -n -1 >> $GITHUB_STEP_SUMMARY 2>/dev/null
          else
            echo "**Recent commits:**" >> $GITHUB_STEP_SUMMARY
            git log --oneline -15 --no-merges --pretty=format:"- %s" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Set package args
        id: pkg
        run: |
          TYPE="${{ steps.info.outputs.type }}"
          VERSION="${{ steps.info.outputs.version }}"
          LABEL="v${VERSION}"

          if [[ "$TYPE" == "dry-run" ]]; then
            echo "args=-d -n SimpleDisenchant-${VERSION}:${LABEL}" >> $GITHUB_OUTPUT
          else
            echo "args=-n SimpleDisenchant-${VERSION}:${LABEL}" >> $GITHUB_OUTPUT
          fi

      - name: Package & Publish
        uses: BigWigsMods/packager@v2
        with:
          args: ${{ steps.pkg.outputs.args }}
        env:
          CF_API_KEY: ${{ steps.info.outputs.type != 'dry-run' && secrets.CF_API_KEY || '' }}
          WAGO_API_TOKEN: ${{ steps.info.outputs.type != 'dry-run' && secrets.WAGO_API_TOKEN || '' }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.info.outputs.type == 'release'
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          BODY=$(sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | head -n -1)
          gh release create "v$VERSION" --title "v$VERSION" --notes "$BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update develop after release
        if: steps.info.outputs.type == 'release'
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          NEXT="${MAJOR}.$((MINOR + 1)).0"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout develop
          git pull origin develop

          sed -i "s/^## Version: .*/## Version: $NEXT/" SimpleDisenchant.toc
          sed -i "/^## \[$VERSION\]/i ## [Unreleased]\n\n### Added\n\n### Fixed\n" CHANGELOG.md

          git add SimpleDisenchant.toc CHANGELOG.md
          git commit -m "chore: bump version to $NEXT after $VERSION release"
          git push origin develop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
