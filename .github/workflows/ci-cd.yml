name: CI/CD

on:
  push:
    branches:
      - develop
      - 'feature/**'
    tags:
      - 'v*'
  release:
    types: [published]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: windows-latest
    if: >
      github.event_name == 'pull_request' ||
      startsWith(github.ref, 'refs/heads/feature/') ||
      github.ref == 'refs/heads/develop' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  package:
    name: Package & Publish
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'release' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      github.ref == 'refs/heads/develop' ||
      startsWith(github.ref, 'refs/heads/feature/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CHANGELOG (release only)
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md ne contient pas d'entrée pour la version $VERSION"
            exit 1
          fi
          echo "CHANGELOG OK pour $VERSION"

      - name: Set package args
        id: pkg
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "args=" >> $GITHUB_OUTPUT
            echo "publish=true" >> $GITHUB_OUTPUT

          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "args=-n {package-name}-{project-version}{beta}{nolib}{classic}:{project-version}{beta}{classic}{nolib}" >> $GITHUB_OUTPUT
            echo "publish=true" >> $GITHUB_OUTPUT

          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "args=-n {package-name}-{project-version}{alpha}{nolib}{classic}:{project-version}{alpha}{classic}{nolib}" >> $GITHUB_OUTPUT
            echo "publish=true" >> $GITHUB_OUTPUT

          else
            # feature/** : -d = skip upload (dry-run packager)
            echo "args=-d -n {package-name}-{project-version}{alpha}{nolib}{classic}:{project-version}{alpha}{classic}{nolib}" >> $GITHUB_OUTPUT
            echo "publish=false" >> $GITHUB_OUTPUT
          fi

      - name: Package & Publish
        uses: BigWigsMods/packager@v2
        with:
          args: ${{ steps.pkg.outputs.args }}
        env:
          CF_API_KEY: ${{ steps.pkg.outputs.publish == 'true' && secrets.CF_API_KEY || '' }}
          WAGO_API_TOKEN: ${{ steps.pkg.outputs.publish == 'true' && secrets.WAGO_API_TOKEN || '' }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
