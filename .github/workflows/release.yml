name: Package and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - develop
      - 'feature/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.5.0) - leave empty for beta/alpha'
        required: false
        type: string
      release_type:
        description: 'Release type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - beta
          - alpha

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Determine the version being released
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.version }}" != "" ]]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=v${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "is_stable=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=v$VERSION" >> $GITHUB_OUTPUT
            echo "is_stable=true" >> $GITHUB_OUTPUT
          else
            echo "is_stable=false" >> $GITHUB_OUTPUT
          fi

      # Validate CHANGELOG entry for stable releases
      - name: Validate CHANGELOG
        if: steps.version.outputs.is_stable == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md does not contain an entry for version $VERSION"
            echo "Add a section '## [$VERSION] - YYYY-MM-DD' to CHANGELOG.md first."
            exit 1
          fi
          echo "CHANGELOG.md contains entry for version $VERSION"

      # Extract release notes from CHANGELOG.md (only the current version section)
      - name: Extract release notes
        if: steps.version.outputs.is_stable == 'true'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract text between "## [VERSION]" and the next "## [" (or end of file)
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          # Write to file for gh release edit
          echo "$NOTES" > /tmp/release-notes.md
          echo "Release notes extracted for v$VERSION"
          cat /tmp/release-notes.md

      # When manually triggered with a version, create and push the tag
      - name: Create tag (manual release)
        if: github.event_name == 'workflow_dispatch' && inputs.version != '' && inputs.release_type == 'release'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, using it"
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG"
          fi

      - name: Set release type
        id: release_type
        run: |
          if [[ "${{ steps.version.outputs.is_stable }}" == "true" ]]; then
            echo "args=" >> $GITHUB_OUTPUT
          elif [[ "${{ inputs.release_type }}" == "beta" || "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "args=-n {package-name}-{project-version}{beta}{nolib}{classic}:{project-version}{beta}{classic}{nolib}" >> $GITHUB_OUTPUT
          else
            echo "args=-n {package-name}-{project-version}{alpha}{nolib}{classic}:{project-version}{alpha}{classic}{nolib}" >> $GITHUB_OUTPUT
          fi

      - name: Package and Release
        uses: BigWigsMods/packager@v2
        with:
          args: ${{ steps.release_type.outputs.args }}
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

      # Update the GitHub release body with extracted changelog section
      - name: Update release notes
        if: steps.version.outputs.is_stable == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          # Wait a moment for the release to be fully created
          sleep 5
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file /tmp/release-notes.md
            echo "Release notes updated for $TAG"
          else
            echo "::warning::Release $TAG not found, skipping notes update"
          fi
